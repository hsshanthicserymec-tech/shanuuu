<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
      text-align: center;
    }

    header {
      background-color: #333;
      color: white;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .image-box {
      display: inline-block;
      margin: 15px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .image-box img {
      width: 250px;
      height: 160px;
      border-radius: 8px;
    }

    .image-box p {
      margin-top: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    Project
  </header>

  <div class="container">
    
    <div class="image-box">
      <img src="https://via.placeholder.com/250x160" alt="Image 1">
      <p>Image 1</p>
    </div>

    <div class="image-box">
      <img src="https://via.placeholder.com/250x160" alt="Image 2">
      <p>Image 2</p>
    </div>

    <div class="image-box">
      <img src="https://via.placeholder.com/250x160" alt="Image 3">
      <p>Image 3</p>
    </div>

  </div>

</body>
</html>
