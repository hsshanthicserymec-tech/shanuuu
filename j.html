<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halli Mane</title>

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

/* ===== BACKGROUND ===== */
body {
  min-height: 100vh;
  background: linear-gradient(-45deg, #ff6b6b, #4facfe, #43e97b, #fa709a);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
  color: white;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== HEADER ===== */
header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
}

header img {
  width: 45px;
  height: 45px;
}

/* ===== GRID ===== */
.container {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 20px;
}

/* ===== CARD ===== */
.card {
  display: flex;
  gap: 15px;
  padding: 15px;
  border-radius: 15px;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.2);

  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

/* IMAGE */
.card img {
  width: 120px;
  height: 120px;
  border-radius: 10px;
  object-fit: cover;
}

/* CONTENT */
.card-content {
  flex: 1;
}

.card-content h3 {
  margin-bottom: 5px;
}

.card-content p {
  font-size: 14px;
  opacity: 0.85;
  margin-bottom: 10px;
}

/* PRICE */
.price {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  header {
    flex-direction: column;
    font-size: 22px;
  }

  .container {
    grid-template-columns: 1fr;
  }

  .card {
    flex-direction: column;
    text-align: center;
  }

  .card img {
    width: 100%;
    height: 200px;
  }

  .price {
    flex-direction: column;
    gap: 5px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" alt="cooker">
  Halli Mane
</header>

<!-- MENU -->
<div class="container" id="menu"></div>

<script>

/* GOOGLE SHEET API (YOUR LINK) */
const API_URL = "https://opensheet.elk.sh/10YBjR18RJpcE3_vroHdfSSskKWxr_Tyu-HC8iFlTgIE/Sheet1";

/* LOAD DATA */
async function loadMenu() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const container = document.getElementById("menu");
    container.innerHTML = "";

    data.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${item.Image}" alt="${item.Item}">
        <div class="card-content">
          <h3>${item.Item}</h3>
          <p>${item.Description}</p>
          <div class="price">
            <span>Half ₹${item["Half Price"]}</span>
            <span>Full ₹${item["Full Price"]}</span>
          </div>
        </div>
      `;

      container.appendChild(card);
    });

  } catch (err) {
    console.error("Error loading data:", err);
  }
}

loadMenu();

</script>

</body>
</html>
